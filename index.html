<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cutting</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

  <style>
    :root {
      --bg-1: #f4f8ff;
      --bg-2: #e9f1ff;
      --panel: #ffffff;
      --ink: #0f223a;
      --muted: #556981;
      --line: #c9d8eb;
      --accent: #1e6fd9;
      --accent-dark: #1452a8;
      --ok: #137333;
      --danger: #b42318;
      --shadow: 0 8px 20px rgba(22, 56, 94, .14);

      --card-idle-bg:      #fff7ed;
      --card-idle-border:  #fb923c;
      --card-idle-text:    #7c2d12;
      --card-warn-bg:      #fefce8;
      --card-warn-border:  #eab308;
      --card-warn-text:    #713f12;
      --card-done-bg:      #f0fdf4;
      --card-done-border:  #22c55e;
      --card-done-text:    #14532d;
      --card-late-bg:      #fff1f2;
      --card-late-border:  #ef4444;
      --card-late-text:    #7f1d1d;
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      font-family: "DM Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #d5e6ff 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #dfe9ff 0%, transparent 30%),
        linear-gradient(125deg, var(--bg-1), var(--bg-2));
      min-height: 100dvh;
    }

    .page { margin: 0 auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

    .hero {
      background: linear-gradient(145deg, #ffffff, #eef5ff);
      border: 1px solid var(--line); border-radius: 22px;
      padding: 12px 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }

    .hero-title { margin: 0; color: var(--accent); font-size: 24px; font-weight: 800; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .status {
      font-size: 13px; font-weight: 700; color: #27476a;
      padding: 6px 10px; border: 1px solid var(--line);
      border-radius: 10px; background: #f4f8ff;
    }
    .status.err { color: var(--danger); border-color: #f9a8a8; background: #fff5f5; }

    .nav-btn {
      border: 1px solid var(--line); background: #f4f8ff;
      color: #123a67; border-radius: 10px; min-height: 40px;
      padding: 8px 12px; font-size: 14px; font-weight: 800; cursor: pointer;
    }
    .nav-btn:hover { background: #e7f0ff }

    .scan-btn { border-color: #8dc0ff; background: #e9f2ff; color: #0f3b6b; }
    .scan-btn:hover { background: #dcecff; }

    .panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 18px; box-shadow: var(--shadow); padding: 14px;
    }

    .hidden { display: none !important }
    .section-title { margin: 0 0 10px; font-size: 18px; font-weight: 800; color: #123a67; }

    /* Batch list */
    .batch-stack { display: flex; flex-direction: column; gap: 10px; }

    .batch-item {
      border: 1px solid var(--line); border-radius: 14px;
      background: #f8fbff; overflow: hidden;
      box-shadow: 0 5px 12px rgba(22,56,94,.08);
    }

    .batch-header {
      width: 100%; border: 0; background: transparent;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; cursor: pointer; text-align: left;
    }
    .batch-header:hover { background: #eef5ff; }

    .drop-icon {
      flex: 0 0 auto; transition: transform 0.2s;
      font-size: 18px; color: var(--accent);
      width: 24px; text-align: center; order: 2;
    }
    .batch-item.expanded .drop-icon { transform: rotate(180deg); }

    .batch-info { flex: 1; }
    .batch-name { margin: 0; font-size: 16px; font-weight: 800; color: #10345d; }
    .batch-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .batch-content {
      display: none; padding: 12px;
      border-top: 1px dashed #d4e2f2; background: #f2f8ff;
    }
    .batch-item.expanded .batch-content { display: block; }

    .collapsed-serials { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .batch-item.expanded .collapsed-serials { display: none; }

    .serial-chip {
      border: 1px solid var(--card-idle-border); border-radius: 6px;
      background: var(--card-idle-bg); color: var(--card-idle-text);
      padding: 2px 7px; font-size: 11px; font-weight: 700;
    }
    .serial-chip.done { color: #166534; border-color: #9fd2b0; background: #f0fdf4; }
    .serial-chip.late { color: #7f1d1d; border-color: #fca5a5; background: #fff1f2; }
    .serial-chip.warn { color: #713f12; border-color: #fde68a; background: #fefce8; }

    .mini-card-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .batch-item.expanded .mini-card-grid { display: grid; }

    @media (min-width: 760px) {
      .mini-card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    .mini-card {
      border-radius: 12px; padding: 10px;
      box-shadow: 0 3px 8px rgba(22,56,94,.08);
      display: flex; flex-direction: column; gap: 5px;
      font-size: 10px; cursor: pointer;
      transition: filter 0.15s, background 0.5s, border-color 0.5s;
      border-width: 2px; border-style: solid;
    }
    .mini-card:hover { filter: brightness(0.96); }

    .mini-card.status-idle { background: var(--card-idle-bg); border-color: var(--card-idle-border); }
    .mini-card.status-warn { background: var(--card-warn-bg); border-color: var(--card-warn-border); }
    .mini-card.status-done { background: var(--card-done-bg); border-color: var(--card-done-border); }
    .mini-card.status-late { background: var(--card-late-bg); border-color: var(--card-late-border); }

    .mini-card .mc-serial    { font-size: 13px; font-weight: 900; color: inherit; }
    .mini-card .mc-cut-label { font-size: 9px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
    .mini-card .mc-cut-val   { font-size: 20px; font-weight: 900; margin: 0; line-height: 1.1; color: inherit; }
    .mini-card .mc-status-badge {
      text-align: center; font-size: 10px; font-weight: 800;
      text-transform: uppercase; padding: 3px 0; border-radius: 6px;
      letter-spacing: 0.04em; background: rgba(0,0,0,0.07); margin-top: 2px;
    }

    /* Serial card */
    .card {
      border-radius: 20px; padding: 20px;
      box-shadow: 0 10px 25px rgba(22,56,94,.12);
      display: flex; flex-direction: column; gap: 15px;
      border-width: 2px; border-style: solid;
      transition: background 0.5s, border-color 0.5s;
    }
    .card.status-idle { background: var(--card-idle-bg); border-color: var(--card-idle-border); }
    .card.status-warn { background: var(--card-warn-bg); border-color: var(--card-warn-border); }
    .card.status-done { background: var(--card-done-bg); border-color: var(--card-done-border); }
    .card.status-late { background: var(--card-late-bg); border-color: var(--card-late-border); }

    .card-top { display: flex; justify-content: space-between; font-weight: 800; font-size: 13px; }

    .status-label-pill {
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.04em;
      background: rgba(0,0,0,0.08);
    }

    .card-body { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
    .cutting-section { flex: 1; min-width: 150px; }
    .cutting-label { font-size: 14px; font-weight: 700; margin-bottom: 5px; opacity: 0.75; }
    .cutting-val   { font-size: 42px; font-weight: 900; margin: 0; letter-spacing: 0.5px; line-height: 1; }

    .details-box {
      border: 1px solid rgba(0,0,0,0.12); border-radius: 15px;
      background: rgba(255,255,255,0.55); padding: 12px 15px; min-width: 140px;
    }
    .detail-item { margin-bottom: 10px; }
    .detail-item:last-child { margin-bottom: 0; }
    .detail-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.65; }
    .detail-val   { font-size: 14px; font-weight: 800; }

    .card-footer { margin-top: 5px; }

    .big-complete-btn {
      width: fit-content; min-width: 150px; height: 48px;
      border: none; border-radius: 12px; color: #fff;
      font-size: 16px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: all 0.2s; padding: 0 20px;
    }
    .big-complete-btn.mark      { background: #22c55e; }
    .big-complete-btn.mark:hover{ background: #16a34a; }
    .big-complete-btn.undo      { background: #f97316; }
    .big-complete-btn.undo:hover{ background: #ea6e00; }

    .empty {
      padding: 24px; text-align: center;
      border: 1px dashed var(--line); border-radius: 14px;
      color: var(--muted); font-weight: 700; background: #f8fbff;
    }

    /* Camera modal */
    .cam-modal {
      position: fixed; inset: 0; background: rgba(10,24,43,.7);
      display: flex; align-items: center; justify-content: center;
      padding: 12px; z-index: 900;
    }
    .cam-card {
      width: min(480px, 100%); background: #fff;
      border: 1px solid var(--line); border-radius: 20px;
      padding: 14px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 12px;
    }
    .cam-title { margin: 0; font-size: 17px; font-weight: 800; color: #123a67; }

    .camera-wrap {
      position: relative; border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden;
      background: #0f223a; aspect-ratio: 4/3;
    }
    #cameraVideo { width: 100%; height: 100%; object-fit: cover; display: block; }

    .scan-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-frame { width: 62%; aspect-ratio: 1; position: relative; }
    .scan-frame::before, .scan-frame::after,
    .scan-frame .corner-br, .scan-frame .corner-bl {
      content: ""; position: absolute; width: 22px; height: 22px;
      border-color: rgba(30,111,217,0.95); border-style: solid;
    }
    .scan-frame::before  { top:0; left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-frame::after   { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-frame .corner-br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-frame .corner-bl { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }

    .scan-line {
      position: absolute; left: 6px; right: 6px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px; animation: scanMove 1.8s ease-in-out infinite; top: 6px;
    }
    @keyframes scanMove {
      0%   { top: 6px; opacity:1; }
      95%  { top: calc(100% - 8px); opacity:1; }
      100% { top: calc(100% - 8px); opacity:0; }
    }

    .loading-overlay {
      position: absolute; inset: 0; background: rgba(15,34,58,0.72);
      backdrop-filter: blur(2px); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; border-radius: 14px;
    }
    .spinner {
      width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { color: #fff; font-size: 13px; font-weight: 700; }

    .scan-steps {
      display: flex; gap: 8px; align-items: center;
      justify-content: center; flex-wrap: wrap;
    }
    .step-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--line); background: #f4f8ff; color: var(--muted);
      transition: all 0.3s;
    }
    .step-pill.active { background: rgba(30,111,217,.1); border-color: var(--accent); color: var(--accent); }
    .step-pill.done   { background: rgba(19,115,51,.1);  border-color: var(--ok);    color: var(--ok); }
    .step-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .step-pill.active .step-dot { animation: dotPulse 1s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .qr-found-ring {
      position: absolute; inset: 0; border: 3px solid #22c55e;
      border-radius: 14px; animation: ringPulse 0.5s ease-out forwards; pointer-events: none;
    }
    @keyframes ringPulse { from{opacity:1;transform:scale(.96)} to{opacity:0;transform:scale(1.02)} }

    .cam-cancel-btn {
      align-self: center; min-height: 40px; border-radius: 10px;
      padding: 8px 18px; font-size: 14px; font-weight: 800;
      cursor: pointer; border: 1px solid var(--line); background: #f4f8ff; color: #123a67;
    }
    .cam-cancel-btn:hover { background: #e2ecff; }

    /* Confirm modal */
    .modal {
      position: fixed; inset: 0; background: rgba(10,24,43,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 12px; z-index: 999;
    }
    .modal-card {
      width: min(460px, 100%); background: #fff;
      border: 1px solid var(--line); border-radius: 16px;
      padding: 14px; box-shadow: var(--shadow);
    }
    .modal-title { margin: 0 0 8px; font-size: 18px; color: #123a67; font-weight: 800; }
    .modal-text  { margin: 0; font-size: 14px; color: #314d6b; line-height: 1.5; }
    .modal-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .modal-btn {
      min-height: 40px; border-radius: 10px;
      border: 1px solid var(--line); background: #f4f8ff;
      color: #123a67; font-size: 13px; font-weight: 800; padding: 8px 12px; cursor: pointer;
    }
    .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Undo toast */
    .undo-toast {
      position: fixed; left: 12px; right: 12px; bottom: 12px;
      z-index: 1000; background: #0f223a; color: #fff;
      border-radius: 12px; padding: 10px 12px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; box-shadow: var(--shadow);
    }
    .undo-actions { display: flex; gap: 6px; align-items: center; }
    .undo-btn {
      border: 1px solid #9fc6ff; color: #9fc6ff; background: transparent;
      border-radius: 8px; min-height: 34px; padding: 6px 10px;
      font-size: 12px; font-weight: 800; cursor: pointer;
    }

    /* Legend */
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--muted); }
    .legend-dot  { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .ld-idle { background: var(--card-idle-border); }
    .ld-warn { background: var(--card-warn-border); }
    .ld-done { background: var(--card-done-border); }
    .ld-late { background: var(--card-late-border); }

    /* Smooth silent-refresh pulse on status pill */
    @keyframes silentPulse {
      0%   { opacity: 1; }
      40%  { opacity: 0.45; }
      100% { opacity: 1; }
    }
    .pulsing { animation: silentPulse 0.7s ease-in-out; }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <h1 class="hero-title">Cutting</h1>
      <div class="controls">
        <div id="status" class="status">Loading data...</div>
        <button id="cameraBtn" class="nav-btn scan-btn" type="button"><i class="bi bi-camera"></i></button>
        <button id="reloadBtn" class="nav-btn" type="button">Reload</button>
      </div>
    </header>

    <section class="panel">
      <!-- BATCH VIEW -->
      <div id="batchView">
        <h2 class="section-title">Batches</h2>
        <div id="batchList" class="batch-stack"></div>
      </div>

      <!-- SERIAL CARD VIEW -->
      <div id="serialView" class="hidden">
        <div class="controls" style="margin-bottom:15px;">
          <button id="backBtn" class="nav-btn" type="button">← Back To Batches</button>
          <div id="selectedBatchLabel" class="status"></div>
        </div>
        <h2 class="section-title">Card Detail</h2>
        <div id="cardContainer"></div>
      </div>
    </section>

    <canvas id="scanCanvas" class="hidden"></canvas>
  </main>

  <!-- CAMERA MODAL -->
  <div id="camModal" class="cam-modal hidden">
    <div class="cam-card">
      <p class="cam-title"><i class="bi bi-camera"></i> Live Scanner</p>
      <div class="camera-wrap" id="cameraWrap">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <div class="scan-overlay">
          <div class="scan-frame">
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-label" id="loadingLabel">Reading label…</div>
        </div>
      </div>
      <div class="scan-steps">
        <div class="step-pill active" id="step1"><div class="step-dot"></div>Scanning QR</div>
        <div class="step-pill" id="step2"><div class="step-dot"></div>Reading Text</div>
        <div class="step-pill" id="step3"><div class="step-dot"></div>Done</div>
      </div>
      <button id="camCancelBtn" class="cam-cancel-btn" type="button">Cancel</button>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-card">
      <h3 class="modal-title">Please Confirm</h3>
      <p id="confirmText" class="modal-text"></p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="modal-btn" type="button">Cancel</button>
        <button id="confirmOkBtn" class="modal-btn primary" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <!-- UNDO TOAST -->
  <div id="undoToast" class="undo-toast hidden">
    <div id="undoText">Marked completed.</div>
    <div class="undo-actions">
      <button id="undoBtn" class="undo-btn" type="button">Undo</button>
      <button id="undoCloseBtn" class="undo-btn" type="button">Close</button>
    </div>
  </div>

  <!-- MANUAL SERIAL ENTRY MODAL (shown when serial not detected) -->
  <div id="manualModal" class="modal hidden">
    <div class="modal-card">
      <h3 class="modal-title">Serial Not Detected</h3>
      <p class="modal-text" style="margin-bottom:12px;">QR batch was read but the serial number could not be detected. Enter it manually to find the card.</p>
      <div style="margin-bottom:4px;">
        <label style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;">Batch</label>
        <div id="manualBatchDisplay" style="padding:10px 12px;background:#f4f8ff;border:1px solid var(--line);border-radius:10px;font-weight:700;font-size:14px;color:#0f223a;"></div>
      </div>
      <div style="margin-top:10px;margin-bottom:4px;">
        <label for="manualSerialInput" style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;">Serial Number</label>
        <input id="manualSerialInput" type="text" inputmode="numeric"
          style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-weight:700;font-size:14px;font-family:inherit;outline:none;"
          placeholder="Enter serial…">
      </div>
      <div class="modal-actions">
        <button id="manualCancelBtn" class="modal-btn" type="button">Cancel</button>
        <button id="manualSearchBtn" class="modal-btn primary" type="button">Find Card</button>
      </div>
    </div>
  </div>

  <!-- NOT-FOUND MODAL -->
  <div id="notFoundModal" class="modal hidden">
    <div class="modal-card">
      <h3 class="modal-title">Card Not Found</h3>
      <p id="notFoundText" class="modal-text"></p>
      <div class="modal-actions">
        <button id="notFoundCloseBtn" class="modal-btn primary" type="button">OK</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbzgAEH3WSFmbobQfIAmBBHZYUVsJcbcE0njXHVADtVR0cnC3AZ1j1qEFA6Cdbp6zsC49w/exec";
    const OCR_API_KEY = "K88514410288957";

    /* ── DOM ── */
    const statusEl           = document.getElementById("status");
    const cameraBtn          = document.getElementById("cameraBtn");
    const reloadBtn          = document.getElementById("reloadBtn");
    const backBtn            = document.getElementById("backBtn");
    const batchView          = document.getElementById("batchView");
    const batchList          = document.getElementById("batchList");
    const serialView         = document.getElementById("serialView");
    const cardContainer      = document.getElementById("cardContainer");
    const selectedBatchLabel = document.getElementById("selectedBatchLabel");
    const scanCanvas         = document.getElementById("scanCanvas");
    const scanCtx            = scanCanvas.getContext("2d");
    const camModal           = document.getElementById("camModal");
    const cameraWrap         = document.getElementById("cameraWrap");
    const cameraVideo        = document.getElementById("cameraVideo");
    const loadingOverlay     = document.getElementById("loadingOverlay");
    const loadingLabel       = document.getElementById("loadingLabel");
    const camCancelBtn       = document.getElementById("camCancelBtn");
    const step1              = document.getElementById("step1");
    const step2              = document.getElementById("step2");
    const step3              = document.getElementById("step3");
    const confirmModal       = document.getElementById("confirmModal");
    const confirmText        = document.getElementById("confirmText");
    const confirmCancelBtn   = document.getElementById("confirmCancelBtn");
    const confirmOkBtn       = document.getElementById("confirmOkBtn");
    const undoToast          = document.getElementById("undoToast");
    const undoText           = document.getElementById("undoText");
    const undoBtn            = document.getElementById("undoBtn");
    const undoCloseBtn       = document.getElementById("undoCloseBtn");
    const manualModal        = document.getElementById("manualModal");
    const manualBatchDisplay = document.getElementById("manualBatchDisplay");
    const manualSerialInput  = document.getElementById("manualSerialInput");
    const manualCancelBtn    = document.getElementById("manualCancelBtn");
    const manualSearchBtn    = document.getElementById("manualSearchBtn");
    const notFoundModal      = document.getElementById("notFoundModal");
    const notFoundText       = document.getElementById("notFoundText");
    const notFoundCloseBtn   = document.getElementById("notFoundCloseBtn");

    // Pending batch key while user types serial in manual modal
    let pendingManualBatch = "";

    /* ── STATE ── */
    let allRows        = [];
    let pendingAction  = null;
    let lastUndoAction = null;
    let undoTimer      = null;
    let mediaStream    = null;
    let scanLoopId     = null;
    let scanActive     = false;
    let qrRingEl       = null;
    let autoRefreshId  = null;
    // Track the currently open card so auto-refresh can re-render it in place
    let activeCardBatch  = null;
    let activeCardSerial = null;

    /* ── STATUS ── */
    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.className = "status" + (isError ? " err" : "");
    }

    /* ── CARD STATUS ── */
    function getCardStatus(row) {
      if (row.isCompleted) return "done";
      const m = (row.cuttingTime || "").match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
      if (!m) return "idle";
      const now = new Date();
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const mer = (m[3] || "").toUpperCase();
      if (mer === "AM") { if (h === 12) h = 0; }
      else if (mer === "PM") { if (h !== 12) h += 12; }
      const cut = new Date(now);
      cut.setHours(h, min, 0, 0);
      const diff = (cut - now) / 60000;
      if (diff < 0)  return "late";
      if (diff <= 5) return "warn";
      return "idle";
    }

    function statusLabel(s) {
      return { done:"Completed", late:"Overdue", warn:"Warning", idle:"Upcoming" }[s] || "Upcoming";
    }

    /* ── UTILS ── */
    function escapeHtml(v) {
      return String(v == null ? "" : v)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function normalizeTime(value) {
      const s = String(value || "").trim().toUpperCase().replace(/\./g, ":");
      if (!s) return "-";
      const m = s.match(/([0-2]?\d)\s*:\s*([0-5]\d)\s*(AM|PM)?/);
      if (m) {
        let hh = Number(m[1]);
        const mm = m[2], mer = m[3];
        if (mer) { hh = hh % 12; if (mer === "PM") hh += 12; }
        const h12 = ((hh + 11) % 12) + 1;
        return String(h12).padStart(2,"0") + ":" + mm + " " + (hh >= 12 ? "PM" : "AM");
      }
      return s;
    }

    function toBoolean(v) {
      const s = String(v == null ? "" : v).trim().toLowerCase();
      return s === "true" || s === "1" || s === "yes" || s === "completed";
    }

    function normalizeRows(rows) {
      return (rows || []).map((r, idx) => ({
        rowNumber:   Number(r.rowNumber || idx + 2),
        cuttingTime: normalizeTime(r.cuttingTime),
        batch:       String(r.batch  || "").trim(),
        serial:      String(r.serial || "").trim(),
        isCompleted: toBoolean(r.isCompleted)
      }));
    }

    function groupBy(rows, key) {
      const map = new Map();
      rows.forEach(r => {
        const k = r[key] || "NO_" + key.toUpperCase();
        if (!map.has(k)) map.set(k, []);
        map.get(k).push(r);
      });
      return map;
    }

    function compareText(a, b) {
      return String(a||"").localeCompare(String(b||""), undefined, { numeric:true, sensitivity:"base" });
    }

    function isSerialDone(sRows) { return sRows.length > 0 && sRows.every(r => r.isCompleted); }
    function statusOrder(s) { return { late:0, warn:1, idle:2, done:3 }[s] ?? 2; }

    /* ── RENDER BATCHES (preserves expand state on silent refresh) ── */
    function renderBatches() {
      // Remember expanded state
      const expanded = new Set();
      batchList.querySelectorAll(".batch-item.expanded").forEach(el => expanded.add(el.dataset.bk));

      batchList.innerHTML = "";
      const batchMap = groupBy(allRows, "batch");
      if (!batchMap.size) { batchList.innerHTML = '<div class="empty">No data.</div>'; return; }

      Array.from(batchMap.entries())
        .sort((a, b) => compareText(a[0], b[0]))
        .forEach(([batch, rows]) => {
          const serialMap  = groupBy(rows, "serial");
          const doneCount  = Array.from(serialMap.values()).filter(isSerialDone).length;
          const wasOpen    = expanded.has(batch);

          const item = document.createElement("div");
          item.className = "batch-item" + (wasOpen ? " expanded" : "");
          item.dataset.bk = batch;

          item.innerHTML = `
            <button class="batch-header">
              <div class="batch-info">
                <p class="batch-name">${escapeHtml(batch === "NO_BATCH" ? "(No Batch)" : batch)}</p>
                <div class="batch-meta">Serials: ${serialMap.size} | Completed: ${doneCount}</div>
                <div class="collapsed-serials"></div>
              </div>
              <span class="drop-icon"><i class="bi bi-chevron-${wasOpen ? "up" : "down"}"></i></span>
            </button>
            <div class="batch-content"><div class="mini-card-grid"></div></div>
          `;

          const header  = item.querySelector(".batch-header");
          const chipBox = item.querySelector(".collapsed-serials");
          const grid    = item.querySelector(".mini-card-grid");

          header.addEventListener("click", () => {
            item.classList.toggle("expanded");
            header.querySelector(".drop-icon").innerHTML =
              item.classList.contains("expanded")
                ? "<i class='bi bi-chevron-up'></i>"
                : "<i class='bi bi-chevron-down'></i>";
          });

          Array.from(serialMap.keys())
            .sort((a, b) => {
              const aDone = isSerialDone(serialMap.get(a));
              const bDone = isSerialDone(serialMap.get(b));
              // Completed always go last; within each group sort by serial number
              if (aDone !== bDone) return aDone ? 1 : -1;
              return compareText(a, b);
            })
            .forEach(sKey => {
              const sRows  = serialMap.get(sKey);
              const latest = sRows[0];
              const status = getCardStatus(latest);
              const sLabel = sKey === "NO_SERIAL" ? "?" : sKey;

              // Chip
              const chip = document.createElement("span");
              chip.className = "serial-chip" +
                (status === "done" ? " done" : status === "late" ? " late" : status === "warn" ? " warn" : "");
              chip.textContent = sLabel;
              chipBox.appendChild(chip);

              // Mini card — clicking goes directly to card detail, NO confirm modal
              const mc = document.createElement("div");
              mc.className = "mini-card status-" + status;
              mc.innerHTML = `
                <div class="mc-serial">Serial: ${escapeHtml(sLabel)}</div>
                <div>
                  <div class="mc-cut-label">Cutting Time</div>
                  <p class="mc-cut-val">${escapeHtml(latest.cuttingTime || "-")}</p>
                </div>
                <div class="mc-status-badge">${statusLabel(status)}</div>
              `;
              mc.addEventListener("click", () => {
                // Read-only view — Complete button is NOT shown (scan-only access)
                renderSerialCard(latest, sRows, false);
                batchView.classList.add("hidden");
                serialView.classList.remove("hidden");
                selectedBatchLabel.textContent = "Serial: " + sLabel;
                setStatus("Viewing serial " + sLabel, false);
              });
              grid.appendChild(mc);
            });

          batchList.appendChild(item);
        });
    }

    /* ── RENDER SERIAL CARD ── */
    // allowAction = true  → shows Complete/Incomplete button (scan flow only)
    // allowAction = false → read-only view (mini-card click)
    function renderSerialCard(latest, serialRows, allowAction = true) {
      const isDone = isSerialDone(serialRows);
      const status = getCardStatus(latest);
      const bText  = latest.batch  || "(No Batch)";
      const sText  = latest.serial || "(No Serial)";

      cardContainer.innerHTML = `
        <div class="card status-${status}">
          <div class="card-top">
            <span>${escapeHtml(bText)}</span>
            <span class="status-label-pill">${statusLabel(status)}</span>
          </div>
          <div class="card-body">
            <div class="cutting-section">
              <div class="cutting-label">Cutting Time</div>
              <p class="cutting-val">${escapeHtml(latest.cuttingTime || "-")}</p>
            </div>
            <div class="details-box">
              <div class="detail-item">
                <div class="detail-label">Batch</div>
                <div class="detail-val">${escapeHtml(bText)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Serial</div>
                <div class="detail-val">${escapeHtml(sText)}</div>
              </div>
            </div>
          </div>
          ${allowAction ? `
          <div class="card-footer">
            <button class="big-complete-btn ${isDone ? "undo" : "mark"}" type="button">
              ${isDone ? "Incomplete" : "Complete"}
            </button>
          </div>` : `
          <div style="padding:8px 0;font-size:12px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px;">
            <i class="bi bi-lock"></i> Scan the label to mark complete / incomplete
          </div>`}
        </div>
      `;

      if (allowAction) {
        cardContainer.querySelector(".big-complete-btn").onclick = () =>
          askCompletionChange({
            rowNumbers:  serialRows.map(r => r.rowNumber),
            isCompleted: !isDone,
            batch:       bText,
            serialLabel: sText
          });
      }
    }

    /* ── COMPLETE / UNDO ── */
    function askCompletionChange(action) {
      pendingAction = action;
      confirmText.textContent =
        `${action.isCompleted ? "Mark as completed" : "Undo completion"} for serial ${action.serialLabel}?`;
      confirmModal.classList.remove("hidden");
    }

    async function applyPendingAction() {
      if (!pendingAction) return;
      const action = pendingAction;
      pendingAction = null;
      confirmModal.classList.add("hidden");
      setStatus("Updating...", false);
      try {
        await postUpdate({ action:"set_completed", rowNumbers: action.rowNumbers.join(","), isCompleted: action.isCompleted });
        updateLocalCompletion(action.rowNumbers, action.isCompleted);

        if (!serialView.classList.contains("hidden")) {
          const rows = allRows.filter(r => r.batch === action.batch && r.serial === action.serialLabel);
          if (rows.length) renderSerialCard(rows[0], rows, true);
          else showBatchView();
        } else {
          renderBatches();
        }

        if (action.isCompleted) showUndoToast(action);
        setStatus("Updated.", false);
      } catch (err) {
        setStatus("Update failed: " + err.message, true);
      }
    }

    function updateLocalCompletion(rowNumbers, isCompleted) {
      const set = new Set(rowNumbers.map(Number));
      allRows = allRows.map(r => set.has(Number(r.rowNumber)) ? { ...r, isCompleted } : r);
    }

    function showUndoToast(action) {
      lastUndoAction = action;
      undoText.textContent = "Completed: serial " + action.serialLabel;
      undoToast.classList.remove("hidden");
      undoTimer = setTimeout(hideUndoToast, 15000);
    }

    function hideUndoToast() {
      if (undoTimer) clearTimeout(undoTimer);
      undoToast.classList.add("hidden");
      lastUndoAction = null;
    }

    /* ── VIEWS ── */
    function showBatchView() {
      activeCardBatch  = null;
      activeCardSerial = null;
      serialView.classList.add("hidden");
      batchView.classList.remove("hidden");
      setStatus("Ready", false);
    }

    /* ── CAMERA ── */
    function setStep(n) {
      [step1, step2, step3].forEach((el, i) => {
        el.classList.remove("active","done");
        if (i + 1 < n)  el.classList.add("done");
        if (i + 1 === n) el.classList.add("active");
      });
    }

    async function startCamera() {
      camModal.classList.remove("hidden");
      loadingOverlay.classList.add("hidden");
      setStep(1);
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        cameraVideo.srcObject = mediaStream;
        await cameraVideo.play();
        startScanLoop();
        setStatus("Scanning…", false);
      } catch (err) {
        camModal.classList.add("hidden");
        setStatus(
          err.name === "NotAllowedError" ? "Camera permission denied."
            : "Camera error: " + (err.message || err.name),
          true
        );
      }
    }

    function stopCamera() {
      scanActive = false;
      if (scanLoopId) { cancelAnimationFrame(scanLoopId); scanLoopId = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      cameraVideo.srcObject = null;
    }

    function startScanLoop() {
      scanActive = true;
      function tick() {
        if (!scanActive) return;
        if (cameraVideo.readyState < cameraVideo.HAVE_ENOUGH_DATA) { scanLoopId = requestAnimationFrame(tick); return; }
        scanCanvas.width  = cameraVideo.videoWidth;
        scanCanvas.height = cameraVideo.videoHeight;
        scanCtx.drawImage(cameraVideo, 0, 0);
        const id = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
        const qr = jsQR(id.data, scanCanvas.width, scanCanvas.height, { inversionAttempts: "attemptBoth" });
        if (qr) { scanActive = false; onQRFound(qr.data); return; }
        scanLoopId = requestAnimationFrame(tick);
      }
      scanLoopId = requestAnimationFrame(tick);
    }

    /* ── QR FOUND → OCR → direct card (no confirm modal) ── */
    async function onQRFound(qrData) {
      // Green flash ring
      if (qrRingEl) qrRingEl.remove();
      qrRingEl = document.createElement("div");
      qrRingEl.className = "qr-found-ring";
      cameraWrap.appendChild(qrRingEl);
      setTimeout(() => { if (qrRingEl) { qrRingEl.remove(); qrRingEl = null; } }, 600);

      stopCamera();
      setStep(2);
      loadingOverlay.classList.remove("hidden");
      loadingLabel.textContent = "Reading label…";

      let serial = "";
      try {
        const ocrText = await readOcrSpace(scanCanvas);
        loadingLabel.textContent = "Fetching card…";
        serial = parseSerial(ocrText);
      } catch (_) { /* OCR failed — try with empty serial */ }

      setStep(3);
      await delay(300);
      loadingOverlay.classList.add("hidden");
      camModal.classList.add("hidden");

      if (qrData && serial) {
        // Both found — open card directly
        openCardByKeys(qrData, serial);
      } else if (qrData && !serial) {
        // QR found but serial not detected — show manual entry modal
        pendingManualBatch = qrData;
        manualBatchDisplay.textContent = qrData;
        manualSerialInput.value = "";
        manualModal.classList.remove("hidden");
        setTimeout(() => manualSerialInput.focus(), 100);
      } else {
        // QR itself not detected
        notFoundText.textContent = "Could not detect a QR code from the label. Please try scanning again with better lighting.";
        notFoundModal.classList.remove("hidden");
      }
    }

    function openCardByKeys(batch, serial) {
      const rows = allRows.filter(r => r.batch === batch && r.serial === serial);
      if (rows.length) {
        activeCardBatch  = batch;
        activeCardSerial = serial;
        renderSerialCard(rows[0], rows, true); // scan flow → action allowed
        batchView.classList.add("hidden");
        serialView.classList.remove("hidden");
        selectedBatchLabel.textContent = "Serial: " + serial;
        setStatus("Card found.", false);
      } else {
        notFoundText.textContent = `No record found for batch "${batch}" and serial "${serial}". Please check and try again.`;
        notFoundModal.classList.remove("hidden");
      }
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    /* ── OCR.SPACE ── */
    async function readOcrSpace(sourceCanvas) {
      const base64 = sourceCanvas.toDataURL("image/jpeg", 0.85);
      const fd = new FormData();
      fd.append("apikey",      OCR_API_KEY);
      fd.append("base64Image", base64);
      fd.append("language",    "eng");
      fd.append("isTable",     "true");
      fd.append("OCREngine",   "2");
      const res  = await fetch("https://api.ocr.space/parse/image", { method:"POST", body:fd });
      const data = await res.json();
      if (data.OCRExitCode === 1 && data.ParsedResults?.length)
        return data.ParsedResults[0].ParsedText || "";
      return "";
    }

    function parseSerial(text) {
      if (!text) return "";
      const lines = text.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);
      const idx = lines.findIndex(l => /(?:S\.?no|Serial)/i.test(l));
      if (idx !== -1) {
        const m = lines[idx].match(/(?:S\.?no|Serial):?\s*(\d+)/i);
        if (m) return m[1];
        if (idx + 1 < lines.length) {
          const nm = lines[idx + 1].match(/^(\d+)$/);
          if (nm) return nm[1];
        }
      }
      const broad = text.match(/(?:S\.?no|Serial):?\s*(\d+)/i);
      return broad ? broad[1] : "";
    }

    /* ── DATA ── */
    async function fetchRows() {
      const url  = SCRIPT_URL + (SCRIPT_URL.includes("?") ? "&" : "?") + "action=rows";
      const res  = await fetch(url);
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || "Fetch failed");
      return data;
    }

    async function postUpdate(payload) {
      const res  = await fetch(SCRIPT_URL, { method:"POST", body: new URLSearchParams(payload) });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || "Update failed");
      return data;
    }

    async function loadData(silent = false) {
      if (!silent) setStatus("Loading...", false);
      try {
        const data = await fetchRows();
        allRows = normalizeRows(data.rows);

        // Re-render whatever is currently visible
        if (!batchView.classList.contains("hidden")) {
          renderBatches();
        }
        if (!serialView.classList.contains("hidden") && activeCardBatch && activeCardSerial) {
          const rows = allRows.filter(r =>
            (r.batch  || "NO_BATCH")  === activeCardBatch &&
            (r.serial || "NO_SERIAL") === activeCardSerial
          );
          if (rows.length) renderSerialCard(rows[0], rows, true);
        }

        if (!silent) {
          showBatchView();
          setStatus("Ready", false);
        }
      } catch (err) {
        if (!silent) setStatus("Load failed.", true);
      }
    }

    /* ── AUTO REFRESH every 10 s — smooth, silent, non-disruptive ── */
    function scheduleAutoRefresh() {
      if (autoRefreshId) clearInterval(autoRefreshId);
      autoRefreshId = setInterval(async () => {
        // Skip refresh while camera or confirm modal is open
        if (!camModal.classList.contains("hidden"))     return;
        if (!confirmModal.classList.contains("hidden")) return;

        // Soft pulse on the status pill — tells user the page is alive
        statusEl.classList.remove("pulsing");
        void statusEl.offsetWidth; // reflow to restart animation
        statusEl.classList.add("pulsing");
        statusEl.addEventListener("animationend", () => statusEl.classList.remove("pulsing"), { once: true });

        await loadData(true);
      }, 10000);
    }

    /* ── EVENTS ── */
    cameraBtn.onclick      = () => startCamera();
    camCancelBtn.onclick   = () => { stopCamera(); camModal.classList.add("hidden"); setStatus("Ready", false); };
    reloadBtn.onclick      = () => loadData(false);
    backBtn.onclick        = showBatchView;
    confirmCancelBtn.onclick = () => confirmModal.classList.add("hidden");
    confirmOkBtn.onclick     = applyPendingAction;
    undoBtn.onclick  = () => { if (lastUndoAction) askCompletionChange({ ...lastUndoAction, isCompleted: false }); hideUndoToast(); };
    undoCloseBtn.onclick = hideUndoToast;

    // Manual serial entry modal
    manualCancelBtn.onclick = () => { manualModal.classList.add("hidden"); setStatus("Scan cancelled.", false); };
    manualSearchBtn.onclick = () => {
      const s = manualSerialInput.value.trim();
      if (!s) { manualSerialInput.focus(); return; }
      manualModal.classList.add("hidden");
      openCardByKeys(pendingManualBatch, s);
    };
    manualSerialInput.addEventListener("keydown", e => { if (e.key === "Enter") manualSearchBtn.click(); });

    // Not-found modal
    notFoundCloseBtn.onclick = () => notFoundModal.classList.add("hidden");
    window.addEventListener("beforeunload", () => stopCamera());

    /* ── INIT ── */
    loadData(false);
    scheduleAutoRefresh();
  </script>
</body>
</html>
